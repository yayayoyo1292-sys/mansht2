<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>News Review</title>
</head>
<body>

<h1>مراجعة الأخبار</h1>

<h2 id="title"></h2>
<p id="predicted"></p>

<button onclick="review('رياضة')">رياضة</button>
<button onclick="review('سياسة')">سياسة</button>
<button onclick="review('فن')">فن</button>
<button onclick="review('اجتماعية')">اجتماعية</button>

<script>

let currentId = null;

async function loadNews() {

    const res = await fetch("http://127.0.0.1:8000/news/review");
    const data = await res.json();

    if(data.message){
        document.body.innerHTML = "<h2>خلصت المقالات 🎉</h2>";
        return;
    }

    currentId = data.id;

    document.getElementById("title").innerText = data.title;

    document.getElementById("predicted").innerText =
        `Predicted: ${data.predicted} (${data.confidence})`;
}

async function review(category){

    await fetch("http://127.0.0.1:8000/news/review", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: currentId,
            category: category
        })
    });

    loadNews();
}

loadNews();

</script>

</body>
</html>
